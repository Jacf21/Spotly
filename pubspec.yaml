name: spotly
description: Aplicación de turismo para Bolivia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.10.3
  
  # Variables de entorno
  flutter_dotenv: ^6.0.0
  
  # Manejo de estado (elige uno)
  provider: ^6.1.2
  # O riverpod: ^2.5.1
  # O flutter_bloc: ^8.1.6
  
  # Utilidades
  equatable: ^2.0.7        # Para comparaciones de objetos
  dartz: ^0.10.1           # Para Either (manejo de errores funcional)
  intl: ^0.19.0            # Para internacionalización y fechas
  image_picker: ^1.2.1     # Para seleccionar imágenes
  geolocator: ^14.0.2      # Para geolocalización
  google_maps_flutter: 2.5.0  # Para mapas interactivos
  geocoding: ^3.0.0
  latlong2: ^0.9.1
  flutter_map: ^6.1.0
  
  # Navegación
  go_router: ^17.1.0       # Navegación declarativa
  flex_color_scheme: ^8.4.0
  google_fonts: ^8.0.2
  font_awesome_flutter: 10.6.0
  skeletonizer: ^2.1.3
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  lucide_icons: ^0.257.0
  rive: ^0.14.4
  flutter_custom_clippers: ^2.1.0
  glass_kit: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13    # Para generación de código

flutter:
  uses-material-design: true
  assets:
  - .env                  # Variables de entorno
   # - assets/images/        # Imágenes
    #- assets/icons/         # Iconos

